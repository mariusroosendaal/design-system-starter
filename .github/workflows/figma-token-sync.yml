name: Figma token sync → PR

# Producer (not a gate): turns a Figma export into a reviewable token PR.
#
# Flow: a designer clicks "Sync to GitHub" in the SNAP Token Sync plugin, which
# commits the raw export to the `figma-sync/incoming` branch (the export file is
# gitignored on main, so it never lands here or in the PR). This workflow then
# runs the deterministic transformer + build, validates with the SAME eval the
# PR gate uses, and opens/updates a single PR if — and only if — tokens drifted.
#
# Kept separate from eval.yml on purpose: that one is a read-only gate; this one
# needs write permissions and a different trigger. They meet at the PR. NOTE:
# PRs opened with the default GITHUB_TOKEN don't re-trigger eval.yml, which is
# why this workflow runs `eval:all` itself as a pre-flight check.

on:
  push:
    branches: [figma-sync/incoming]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

# One sync at a time; newer pushes supersede in-flight runs.
concurrency:
  group: figma-token-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Extract export from incoming branch
        id: export
        run: |
          set -euo pipefail
          git fetch origin figma-sync/incoming
          BLOB=design-system/tokens/figma-sync/figma-export.json
          # Read the blob straight out of the incoming branch — never merge it,
          # so the gitignored export stays out of main and out of the PR. If it's
          # not there yet (e.g. the branch was just seeded), no-op cleanly.
          if git cat-file -e "origin/figma-sync/incoming:$BLOB" 2>/dev/null; then
            EXPORT="$RUNNER_TEMP/figma-export.json"
            git show "origin/figma-sync/incoming:$BLOB" > "$EXPORT"
            echo "EXPORT=$EXPORT" >> "$GITHUB_ENV"
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "Export size: $(wc -c < "$EXPORT") bytes"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No export on figma-sync/incoming yet — nothing to do."
          fi

      - if: steps.export.outputs.found == 'true'
        run: npm ci

      - name: Transform + build tokens
        if: steps.export.outputs.found == 'true'
        run: npm run sync -- "$EXPORT"

      - name: Detect drift
        if: steps.export.outputs.found == 'true'
        id: drift
        run: |
          if [ -n "$(git status --porcelain design-system/tokens design-system/dist)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Token drift detected:"
            git status --porcelain design-system/tokens design-system/dist
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No token drift — Figma matches the repo. Nothing to PR."
          fi

      - name: Validate (build + eval) before opening a PR
        if: steps.drift.outputs.changed == 'true'
        env:
          # Optional: add ANTHROPIC_API_KEY as a repo secret to enable the LLM judge.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          npm run build
          npm run eval:all

      - name: Open / update token-sync PR
        if: steps.drift.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          base: main
          branch: figma-sync/update
          delete-branch: true
          add-paths: |
            design-system/tokens/**
            design-system/dist/**
          commit-message: "Sync design tokens from Figma"
          title: "Sync design tokens from Figma"
          labels: |
            figma-sync
            tokens
          body: |
            Automated token sync from the Figma export pushed via the **SNAP Token Sync** plugin.

            - Generated by the deterministic transformer (`npm run sync`) — no LLM, Figma owns the values.
            - Validated with `npm run build` + `npm run eval:all` before this PR was opened.

            Review the diff as the source of truth. If something looks wrong, fix it **in Figma** and re-sync rather than hand-editing the JSON.
